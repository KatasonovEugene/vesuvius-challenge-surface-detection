_target_: src.model.SlidingWindowWrapper
model:
  _target_: src.model.ResidualUNetDetector
  spatial_dims: 3
  in_channels: 1
  out_channels: 2
  features_per_stage: [32, 64, 128, 256, 320, 320]
  kernel_size: [3, 3, 3]
  strides: [[1, 1, 1],[2, 2, 2],[2, 2, 2],[2, 2, 2],[2, 2, 2],[2, 2, 2]]
  n_blocks_per_stage: [1, 3, 4, 6, 6, 6]
  n_blocks_per_stage_decoder: 1
  norm: instance
  act: leaky_relu
  conv_bias: true
  deep_supervision: true
  deep_supr_num: 1
roi_size: [160, 160, 160]
sw_batch_size: 1
overlap: 0.5
mode: 'gaussian'
