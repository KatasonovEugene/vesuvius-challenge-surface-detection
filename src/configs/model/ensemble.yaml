_target_: src.model.SlidingWindowWrapper
model:
  _target_: src.model.Ensemble
  ensemble_models:
    - _target_: src.model.nnUNetDetector
      spatial_dims: 3
      in_channels: 1
      out_channels: 2
      features_per_stage: [32, 64, 128, 256, 320, 320]
      kernel_size: [[3, 3, 3],[3, 3, 3],[3, 3, 3],[3, 3, 3],[3, 3, 3],[3, 3, 3]]
      strides: [[1, 1, 1],[2, 2, 2],[2, 2, 2],[2, 2, 2],[2, 2, 2],[2, 2, 2]]
      deep_supr_num: 1
    - _target_: src.model.SegResNetDetector
      spatial_dims: 3
      in_channels: 1
      out_channels: 2
      init_filters: 16
      dropout_prob: 0.2
roi_size: [160, 160, 160]
sw_batch_size: 1
overlap: 0.5
mode: 'gaussian'
