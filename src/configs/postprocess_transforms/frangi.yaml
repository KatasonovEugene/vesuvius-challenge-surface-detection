# Additional post-processing step:
# 1) threshold softmax output at 0.75
# 2) run a "surfaceness" Frangi-style filter (Hessian eigenvalue handling adapted for plates)
# 3) then apply the usual binarization + morphology

enhance:
  _target_: src.transforms.SurfacenessFrangiEnhance
  pre_threshold: 0.2
  threshold_mode: mask  # hard -> {0,1}, mask -> keep original probs above threshold
  sigmas: [0.5, 1.0, 1.5]
  alpha: 1.0
  beta: 1.0
  eigen_mode: full
  normalize_response: false
  normalize_output: false
  eps: 1e-7

outputs:
  _target_: src.transforms.PostProcess
  T_low: 0.35
  T_high: 0.80
  z_radius: 2
  xy_radius: 1
  pre_closing_dust_min_size: 200
  dust_min_size: 200
  quantile_threshold: false
