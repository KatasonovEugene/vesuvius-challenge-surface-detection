train:
  volume:
    _target_: src.transforms.RandShiftIntensity
    prob: 0.4
    max_k: 3
    spatial_axes: [0, 1]
  volume@target:
    _target_: torch.nn.Sequential
    _args_:
      - _target_: src.transforms.RandSpatialCrop3D
        size: [128, 128, 128]
      - _target_: src.transforms.RandFlip3D
        spatial_axis: 0
        prob: 0.5
      - _target_: src.transforms.RandFlip3D
        spatial_axis: 1
        prob: 0.5
      - _target_: src.transforms.RandFlip3D
        spatial_axis: 2
        prob: 0.5
      - _target_: src.transforms.RandRotate90_3D
        prob: 0.4
        max_k: 3
        spatial_axes: [0, 1]

inference: null

postprocess:
  outputs:
    _target_: src.transforms.PostProcess
    T_low: 0.50
    T_high: 0.90
    z_radius: 1
    xy_radius: 0
    dust_min_size: 100
