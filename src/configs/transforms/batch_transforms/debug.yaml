train:
  shift_intensity:
    _target_: src.transforms.RandShiftIntensity3D
    offsets: 0.10
    prob: 0.5
  crop:
    _target_: src.transforms.RandSpatialCrop3D
    size: [24, 24, 24]
  flip1:
    _target_: src.transforms.RandFlip3D
    spatial_axis: 0 # D
    prob: 0.5
  flip2:
    _target_: src.transforms.RandFlip3D
    spatial_axis: 1 # H
    prob: 0.5
  flip3:
    _target_: src.transforms.RandFlip3D
    spatial_axis: 2 # W
    prob: 0.5
  rot90:
    _target_: src.transforms.RandRotate90_3D
    prob: 0.4
    possible_k: [1, 3]
    spatial_axes: [1, 2] # D H
  elastic_deformation:
    _target_: src.transforms.ElasticDeformation
    prob: 0.5
    sigma: 9.0
    alpha_x: 10.0
    alpha_y: 10.0
    alpha_z: 5.0
  z_drop:
    _target_: src.transforms.ZDrop3D
    prob: 1
    slice_prob: 1
    drop_mode: 'default'
    fill_mode: 'zero'
    block_size_min: 5
    block_size_max: 10

inference:
  crop:
    _target_: src.transforms.RandSpatialCrop3D
    size: [24, 24, 24]

postprocess:
  outputs:
    _target_: src.transforms.PostProcess
    T_low: 0.50
    T_high: 0.90
    z_radius: 1
    xy_radius: 0
    dust_min_size: 100
