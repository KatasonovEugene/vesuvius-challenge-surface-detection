defaults:
  - model: nnunet
  - metrics: cldice_temp
  - datasets: default
  - dataloader: local
  - batch_transforms: main
  - instance_transforms: main
  - postprocess_transforms: empty
  - tta_transforms: empty
  - _self_
inferencer:
  device_tensors: ["volume", "gt_mask", "gt_skel"]
  device: auto
  seed: 1
  use_amp: False
  amp_dtype: "bfloat16"
  from_pretrained: "models/nnunet-elastic.pth"
