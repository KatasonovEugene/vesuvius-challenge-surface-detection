defaults:
  - model: segresnet
  - writer: wandb
  - metrics: empty
  - datasets: default
  - dataloader: default
  - transforms: main
  - loss: skeleton_dice_loss
  - optimizer: adamw
  - lr_scheduler: warmup_cosine
  - _self_

trainer:
  log_step: 10
  n_epochs: 30
  epoch_len: 500
  device_tensors: ["volume", "gt_mask", "gt_skel"]
  resume_from: null
  from_pretrained: null
  device: auto
  override: False
  monitor: "off"
  save_period: 5
  early_stop: ${trainer.n_epochs}
  save_dir: "saved"
  seed: 1
