defaults:
  - model: nnunet
  - writer: wandb
  - metrics: main
  - datasets: default
  - dataloader: default
  - transforms: main
  - loss: nnunet_loss
  - optimizer: adamw
  - lr_scheduler: warmup_cosine
  - _self_

trainer:
  log_step: 10
  n_epochs: 66
  epoch_len: 1500
  device_tensors: ["volume", "gt_mask", "gt_skel"]
  resume_from: null
  from_pretrained: null
  device: auto
  override: False
  monitor: "min val_loss"
  save_period: 5
  early_stop: ${trainer.n_epochs}
  save_dir: "saved"
  seed: 1
